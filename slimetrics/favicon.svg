<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Liquid slime gradient: bright top → deep emerald bottom -->
    <linearGradient id="goo" x1="0" y1="0.05" x2="0" y2="1">
      <stop offset="0%"  stop-color="#a4ffc8"/>
      <stop offset="55%" stop-color="#50e878"/>
      <stop offset="100%" stop-color="#1f8240"/>
    </linearGradient>
    <!-- Glass body subtle sheen -->
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="35%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Clip path that matches the tube interior so liquid + eyes stay inside -->
    <clipPath id="tubeInterior">
      <path d="M11.4 5.4 V21 a4.6 4.6 0 0 0 9.2 0 V5.4 Z"/>
    </clipPath>
    <!-- Soft glow on slime surface -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Rounded dark backdrop, matches game brand chrome -->
  <rect width="32" height="32" rx="7" fill="#0d0c1a"/>
  <!-- Faint inner radial so the icon glows on dark UIs -->
  <circle cx="16" cy="16" r="14" fill="url(#goo)" opacity="0.04"/>

  <!-- ─── Slime liquid (clipped to tube) ─── -->
  <g clip-path="url(#tubeInterior)">
    <!-- main fill, with a wavy meniscus top surface -->
    <path d="M11 14
             Q13.5 12.5 16 13.5
             Q18.5 14.5 21 13
             L21 28 L11 28 Z" fill="url(#goo)"/>
    <!-- glossy highlight on the meniscus -->
    <path d="M11.5 14.2 Q14 12.8 16 13.7 Q18 14.6 20.5 13.4"
          fill="none" stroke="#dafff0" stroke-width="0.5" stroke-linecap="round" opacity="0.7"/>
    <!-- inner left-side glow -->
    <ellipse cx="13" cy="20" rx="1.2" ry="3.2" fill="#ffffff" opacity="0.18" filter="url(#glow)"/>
    <!-- bubbles rising in liquid -->
    <circle cx="13.4" cy="23" r="0.55" fill="#dafff0" opacity="0.85"/>
    <circle cx="18.6" cy="25" r="0.4"  fill="#dafff0" opacity="0.7"/>
    <circle cx="15.2" cy="26.4" r="0.32" fill="#dafff0" opacity="0.55"/>
    <!-- eyes -->
    <circle cx="14.2" cy="19.4" r="0.95" fill="#0d0c1a"/>
    <circle cx="17.8" cy="19.4" r="0.95" fill="#0d0c1a"/>
    <circle cx="14.5" cy="19.05" r="0.32" fill="#ffffff"/>
    <circle cx="18.1" cy="19.05" r="0.32" fill="#ffffff"/>
    <!-- smile -->
    <path d="M14.4 21.6 Q16 22.7 17.6 21.6"
          fill="none" stroke="#0d0c1a" stroke-width="0.7" stroke-linecap="round"/>
  </g>

  <!-- ─── Tube glass body ─── -->
  <!-- Glass body interior sheen (fills tube but not too saturated) -->
  <path d="M11.4 5.4 V21 a4.6 4.6 0 0 0 9.2 0 V5.4 Z" fill="url(#glass)"/>
  <!-- Tube outline -->
  <path d="M11.4 5.4 V21 a4.6 4.6 0 0 0 9.2 0 V5.4"
        fill="none" stroke="#e8e8f0" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tube lip (top) -->
  <line x1="9.6" y1="5.4" x2="22.4" y2="5.4"
        stroke="#e8e8f0" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Lip thickness shadow -->
  <line x1="9.8" y1="6.2" x2="22.2" y2="6.2"
        stroke="rgba(0,0,0,0.25)" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Vertical glass highlight (left side) -->
  <line x1="12.2" y1="7.5" x2="12.2" y2="20.5"
        stroke="#ffffff" stroke-width="0.8" stroke-linecap="round" opacity="0.45"/>

  <!-- ─── Sparkle outside (gold accent) ─── -->
  <g transform="translate(25 8)" fill="#ffd840">
    <path d="M0 -2.4 L0.5 -0.5 L2.4 0 L0.5 0.5 L0 2.4 L-0.5 0.5 L-2.4 0 L-0.5 -0.5 Z"/>
  </g>
  <!-- secondary tiny sparkle -->
  <g transform="translate(7 24)" fill="#79f0b2" opacity="0.85">
    <path d="M0 -1.4 L0.3 -0.3 L1.4 0 L0.3 0.3 L0 1.4 L-0.3 0.3 L-1.4 0 L-0.3 -0.3 Z"/>
  </g>
</svg>
